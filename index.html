<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <h1>Focus</h1>
    <button id="dark-mode-toggle" aria-label="Toggle dark mode">🌙</button>
  </header>

  <main>
    <!-- Add Task Form -->
    <section class="form-section">
      <form id="task-form">
        <input type="text" id="title" placeholder="Task title" required />
        <input type="text" id="project" placeholder="Project name" />
        <input type="text" id="tags" placeholder="Tags (comma separated)" />
        <textarea id="description" placeholder="Description (optional)" rows="2"></textarea>
        <div class="form-row">
          <select id="priority">
            <option value="urgent">Urgent</option>
            <option value="normal" selected>Normal</option>
            <option value="someday">Someday</option>
          </select>
          <input type="date" id="due-date" />
          <button type="submit">Add Task</button>
        </div>
      </form>
    </section>

    <!-- Search & Filters -->
    <section class="search-section">
      <input type="text" id="search" placeholder="Search by title, tag, or project..." />
      <div class="filters">
        <select id="filter-priority">
          <option value="all">All priorities</option>
          <option value="urgent">Urgent</option>
          <option value="normal">Normal</option>
          <option value="someday">Someday</option>
        </select>
        <select id="sort-by">
          <option value="newest">Newest first</option>
          <option value="due">Due date</option>
        </select>
      </div>
    </section>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-box">
        <h2>Edit Task</h2>
        <form id="edit-form">
          <input type="text" id="edit-title" placeholder="Task title" required />
          <input type="text" id="edit-project" placeholder="Project name" />
          <input type="text" id="edit-tags" placeholder="Tags (comma separated)" />
          <textarea id="edit-description" placeholder="Description (optional)" rows="2"></textarea>
          <div class="form-row">
            <select id="edit-priority">
              <option value="urgent">Urgent</option>
              <option value="normal">Normal</option>
              <option value="someday">Someday</option>
            </select>
            <input type="date" id="edit-due-date" />
          </div>
          <div class="form-row modal-actions">
            <button type="submit">Save</button>
            <button type="button" id="edit-cancel">Cancel</button>
          </div>
        </form>
      </div>
    </div>

    <!-- Task List -->
    <section class="task-list-section">
      <ul id="task-list"></ul>
      <p id="empty-state" class="empty-state">No tasks yet — add one above.</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
